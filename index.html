<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Download videos from YouTube, Instagram, and Pinterest easily.">
    <meta name="keywords" content="video downloader, YouTube, Instagram, Pinterest, free download">
    <title>VibeFetch - Video Downloader</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>VibeFetch</h1>
        <p>Download your favorite videos from YouTube, Instagram, and Pinterest.</p>
    </header>
    <main>
        <section>
            <h2>Video Download</h2>
            <form id="videoForm">
                <label for="url">Enter Video URL:</label>
                <input type="text" id="url" placeholder="Paste your video URL here" required>
                <select id="platform">
                    <option value="youtube">YouTube</option>
                    <option value="instagram">Instagram</option>
                    <option value="pinterest">Pinterest</option>
                </select>
                <button type="submit">Download</button>
            </form>
            <div id="result"></div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 VibeFetch. All rights reserved.</p>
    </footer>
    <script src="app.js"></script>
</body>
</html>
